<!DOCTYPE html>
<html>
<head>
    <title>Session Summary</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            margin: 40px auto;
            width: 60%;
            border-radius: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
        .btn-download {
            background-color: #22c55e;
            color: white;
        }
        .btn-restart {
            background-color: #3b82f6;
            color: white;
        }
        img {
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>📊 Session Summary</h1>

<div class="card">
    <p><strong>Session Duration:</strong> {{ data.duration }} seconds</p>
    <p><strong>Average Attention:</strong> {{ data.avg_attention }}</p>
    <p><strong>Total Blinks:</strong> {{ data.blinks }}</p>
    <p><strong>Fatigue Events:</strong> {{ data.fatigue }}</p>
    <p><strong>Time Distracted:</strong> {{ data.distraction }}%</p>

    <img src="{{ url_for('static', filename='attention_plot.png') }}" width="600">

    <br><br>

    <a href="/download">
    <button class="btn-download">Download CSV</button>
    </a>

    <a href="/">
        <button class="btn-restart">Start New Session</button>
    </a>
</div>

</body>
</html>
