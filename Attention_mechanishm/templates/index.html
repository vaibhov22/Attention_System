<!DOCTYPE html>
<html>
<head>
    <title>AI Attention Monitoring System</title>
    <style>
        body {
            font-family: Arial;
            background-color: #111;
            color: white;
            text-align: center;
        }
        img {
            border: 3px solid cyan;
            margin-top: 20px;
        }
        .metrics {
            margin-top: 20px;
            font-size: 20px;
        }
        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 16px;
            background-color: cyan;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #00bbbb;
        }
    </style>
</head>
<body>

<h1>🧠 Real-Time Attention Monitoring System</h1>

<img src="{{ url_for('video') }}" width="640">

<div class="metrics">
    <p>Attention Score: <span id="attention">--</span></p>
    <p>Blink Count: <span id="blink">--</span></p>
    <p>State: <span id="state">--</span></p>
    <p>Fatigue: <span id="fatigue">--</span></p>
</div>

<!-- Stop Session Button -->
<a href="/stop">
    <button class="btn">
        Stop Session & View Summary
    </button>
</a>

<script>
function fetchStats() {
    fetch('/stats')
    .then(response => response.json())
    .then(data => {
        document.getElementById("attention").innerText = data.attention;
        document.getElementById("blink").innerText = data.blink_count;
        document.getElementById("state").innerText = data.state;
        document.getElementById("fatigue").innerText = data.fatigue ? "Yes" : "No";
    });
}

setInterval(fetchStats, 500);
</script>

</body>
</html>
